<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .text { font: 16px Arial, sans-serif; fill: #1e293b; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .actor { fill: #ffffff; stroke: #0f172a; stroke-width: 3; }
      .system { fill: #f8fafc; stroke: #1d4ed8; stroke-width: 3; rx: 24; ry: 24; }
      .usecase { fill: #ffffff; stroke: #2563eb; stroke-width: 2.2; }
