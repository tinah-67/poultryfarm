<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .entity {
        fill: #ffffff;
        stroke: #333333;
        stroke-width: 3;
      }
      .process {
        fill: #ffffff;
        stroke: #333333;
        stroke-width: 3;
      }
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 28px;
        font-weight: 700;
        fill: #222222;
      }
      .entity-text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 24px;
        fill: #222222;
      }
      .process-text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        fill: #222222;
      }
      .flow-text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        fill: #222222;
      }
      .arrow {
        stroke: #333333;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrowhead);
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333" />
    </marker>
  </defs>

  <text x="600" y="60" text-anchor="middle" class="title">Context Diagram</text>

  <rect x="430" y="90" width="340" height="90" rx="6" ry="6" class="entity" />
  <text x="600" y="145" text-anchor="middle" class="entity-text">Owner</text>

  <rect x="900" y="330" width="250" height="90" rx="6" ry="6" class="entity" />
  <text x="1025" y="385" text-anchor="middle" class="entity-text">Manager</text>

  <rect x="430" y="620" width="340" height="90" rx="6" ry="6" class="entity" />
  <text x="600" y="675" text-anchor="middle" class="entity-text">Worker</text>

  <circle cx="600" cy="380" r="125" class="process" />
  <text x="600" y="355" text-anchor="middle" class="process-text">BroilerHub Poultry</text>
  <text x="600" y="385" text-anchor="middle" class="process-text">Farm Management</text>
  <text x="600" y="415" text-anchor="middle" class="process-text">System</text>

  <line x1="555" y1="255" x2="555" y2="180" class="arrow" />
  <text x="485" y="225" text-anchor="middle" class="flow-text">Dashboards, Reports</text>

  <line x1="645" y1="180" x2="645" y2="255" class="arrow" />
  <text x="735" y="225" text-anchor="middle" class="flow-text">Farm, Batch, Sales</text>
  <text x="735" y="248" text-anchor="middle" class="flow-text">and Expense Data</text>

  <line x1="725" y1="345" x2="900" y2="345" class="arrow" />
  <text x="812" y="327" text-anchor="middle" class="flow-text">Summaries, Reports</text>

  <line x1="900" y1="405" x2="725" y2="405" class="arrow" />
  <text x="812" y="442" text-anchor="middle" class="flow-text">Expense Details,</text>
  <text x="812" y="465" text-anchor="middle" class="flow-text">Report Requests</text>

  <line x1="555" y1="620" x2="555" y2="505" class="arrow" />
  <text x="462" y="560" text-anchor="middle" class="flow-text">Assigned Batch Details,</text>
  <text x="462" y="583" text-anchor="middle" class="flow-text">Reminders</text>

  <line x1="645" y1="505" x2="645" y2="620" class="arrow" />
  <text x="735" y="560" text-anchor="middle" class="flow-text">Feed, Mortality,</text>
  <text x="735" y="583" text-anchor="middle" class="flow-text">Vaccination Records</text>
</svg>
