<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1300" viewBox="0 0 1900 1300">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #111; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #444; }
      .entity { fill: #ffffff; stroke: #1f2937; stroke-width: 2.8; }
      .process { fill: #ffffff; stroke: #1f2937; stroke-width: 2.8; }
      .store-line { stroke: #1f2937; stroke-width: 3; }
      .entityText { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #111; }
      .processText { font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; fill: #111; }
      .storeText { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #111; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #111; }
      .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
  </defs>

  <text x="950" y="55" text-anchor="middle" class="title">Level 1 Data Flow Diagram</text>
  <text x="950" y="88" text-anchor="middle" class="subtitle">BroilerHub Poultry Farm Management System</text>

  <!-- External entities -->
  <rect x="60" y="170" width="220" height="90" class="entity"/>
  <text x="170" y="225" text-anchor="middle" class="entityText">Owner</text>

  <rect x="60" y="520" width="220" height="90" class="entity"/>
  <text x="170" y="575" text-anchor="middle" class="entityText">Manager</text>

  <rect x="60" y="860" width="220" height="90" class="entity"/>
  <text x="170" y="915" text-anchor="middle" class="entityText">Worker</text>

  <!-- Processes -->
  <circle cx="640" cy="220" r="105" class="process"/>
  <text x="640" y="200" text-anchor="middle" class="processText">1.0</text>
  <text x="640" y="230" text-anchor="middle" class="processText">Manage Users,</text>
  <text x="640" y="258" text-anchor="middle" class="processText">Farms &amp; Batches</text>

  <circle cx="640" cy="560" r="105" class="process"/>
  <text x="640" y="540" text-anchor="middle" class="processText">2.0</text>
  <text x="640" y="570" text-anchor="middle" class="processText">Record Poultry</text>
  <text x="640" y="598" text-anchor="middle" class="processText">Operations</text>

  <circle cx="640" cy="900" r="105" class="process"/>
  <text x="640" y="880" text-anchor="middle" class="processText">3.0</text>
  <text x="640" y="910" text-anchor="middle" class="processText">Manage Expenses</text>
  <text x="640" y="938" text-anchor="middle" class="processText">&amp; Sales</text>

  <circle cx="1130" cy="380" r="105" class="process"/>
  <text x="1130" y="360" text-anchor="middle" class="processText">4.0</text>
  <text x="1130" y="390" text-anchor="middle" class="processText">Generate Reports</text>
  <text x="1130" y="418" text-anchor="middle" class="processText">&amp; Performance</text>

  <circle cx="1130" cy="800" r="105" class="process"/>
  <text x="1130" y="780" text-anchor="middle" class="processText">5.0</text>
  <text x="1130" y="810" text-anchor="middle" class="processText">Notifications</text>
  <text x="1130" y="838" text-anchor="middle" class="processText">&amp; Synchronization</text>

  <!-- Data stores -->
  <!-- D1 -->
  <line x1="1450" y1="120" x2="1720" y2="120" class="store-line"/>
  <line x1="1450" y1="185" x2="1720" y2="185" class="store-line"/>
  <line x1="1450" y1="120" x2="1450" y2="185" class="store-line"/>
  <text x="1585" y="150" text-anchor="middle" class="storeText">D1 Users</text>

  <!-- D2 -->
  <line x1="1450" y1="280" x2="1720" y2="280" class="store-line"/>
  <line x1="1450" y1="345" x2="1720" y2="345" class="store-line"/>
  <line x1="1450" y1="280" x2="1450" y2="345" class="store-line"/>
  <text x="1585" y="310" text-anchor="middle" class="storeText">D2 Farms</text>

  <!-- D3 -->
  <line x1="1450" y1="440" x2="1720" y2="440" class="store-line"/>
  <line x1="1450" y1="505" x2="1720" y2="505" class="store-line"/>
  <line x1="1450" y1="440" x2="1450" y2="505" class="store-line"/>
  <text x="1585" y="470" text-anchor="middle" class="storeText">D3 Batches</text>

  <!-- D4 -->
  <line x1="1450" y1="610" x2="1720" y2="610" class="store-line"/>
  <line x1="1450" y1="675" x2="1720" y2="675" class="store-line"/>
  <line x1="1450" y1="610" x2="1450" y2="675" class="store-line"/>
  <text x="1585" y="640" text-anchor="middle" class="storeText">D4 Operational Records</text>

  <!-- D5 -->
  <line x1="1450" y1="780" x2="1720" y2="780" class="store-line"/>
  <line x1="1450" y1="845" x2="1720" y2="845" class="store-line"/>
  <line x1="1450" y1="780" x2="1450" y2="845" class="store-line"/>
  <text x="1585" y="810" text-anchor="middle" class="storeText">D5 Expenses &amp; Sales</text>

  <!-- D6 -->
  <line x1="1450" y1="950" x2="1720" y2="950" class="store-line"/>
  <line x1="1450" y1="1015" x2="1720" y2="1015" class="store-line"/>
  <line x1="1450" y1="950" x2="1450" y2="1015" class="store-line"/>
  <text x="1585" y="980" text-anchor="middle" class="storeText">D6 Backup / Sync Data</text>

  <!-- Entity to process flows -->
  <line x1="280" y1="210" x2="535" y2="210" class="arrow"/>
  <text x="405" y="193" text-anchor="middle" class="label">staff details, farm data, batch data</text>

  <line x1="535" y1="245" x2="280" y2="245" class="arrow"/>
  <text x="405" y="280" text-anchor="middle" class="label">user status, farm info, batch info</text>

  <line x1="280" y1="550" x2="535" y2="550" class="arrow"/>
  <text x="405" y="532" text-anchor="middle" class="label">monitoring requests</text>

  <line x1="280" y1="890" x2="535" y2="890" class="arrow"/>
  <text x="405" y="872" text-anchor="middle" class="label">feed, mortality, vaccination data</text>

  <line x1="280" y1="925" x2="535" y2="925" class="arrow"/>
  <text x="405" y="960" text-anchor="middle" class="label">expense and sales data</text>

  <line x1="1030" y1="380" x2="280" y2="380" class="arrow"/>
  <text x="630" y="362" text-anchor="middle" class="label">reports, summaries</text>

  <line x1="1030" y1="800" x2="280" y2="800" class="arrow"/>
  <text x="630" y="782" text-anchor="middle" class="label">alerts, reminders, sync status</text>

  <!-- Inter-process flows -->
  <line x1="640" y1="325" x2="640" y2="455" class="arrow"/>
  <text x="660" y="392" class="label">batch context</text>

  <line x1="640" y1="665" x2="640" y2="795" class="arrow"/>
  <text x="660" y="732" class="label">cost activity</text>

  <line x1="745" y1="220" x2="1040" y2="335" class="arrow"/>
  <text x="905" y="255" text-anchor="middle" class="label">farm and batch data</text>

  <line x1="745" y1="560" x2="1040" y2="425" class="arrow"/>
  <text x="900" y="500" text-anchor="middle" class="label">feed / mortality / vaccination data</text>

  <line x1="745" y1="900" x2="1040" y2="845" class="arrow"/>
  <text x="900" y="888" text-anchor="middle" class="label">expense and sales records</text>

  <line x1="745" y1="900" x2="1040" y2="415" class="arrow"/>
  <text x="860" y="690" text-anchor="middle" class="label">financial data</text>

  <line x1="1130" y1="485" x2="1130" y2="695" class="arrow"/>
  <text x="1152" y="595" class="label">report triggers</text>

  <!-- Process to store flows -->
  <line x1="1235" y1="320" x2="1450" y2="150" class="arrow"/>
  <text x="1325" y="210" text-anchor="middle" class="label">user records</text>

  <line x1="745" y1="185" x2="1450" y2="310" class="arrow"/>
  <text x="1100" y="215" text-anchor="middle" class="label">farm records</text>

  <line x1="745" y1="240" x2="1450" y2="470" class="arrow"/>
  <text x="1100" y="330" text-anchor="middle" class="label">batch records</text>

  <line x1="745" y1="560" x2="1450" y2="640" class="arrow"/>
  <text x="1110" y="585" text-anchor="middle" class="label">operational records</text>

  <line x1="745" y1="935" x2="1450" y2="810" class="arrow"/>
  <text x="1115" y="905" text-anchor="middle" class="label">expense and sales records</text>

  <line x1="1235" y1="820" x2="1450" y2="980" class="arrow"/>
  <text x="1330" y="925" text-anchor="middle" class="label">backup / sync payloads</text>

  <!-- Store back to reporting / sync -->
  <line x1="1450" y1="150" x2="1235" y2="340" class="arrow"/>
  <line x1="1450" y1="310" x2="1235" y2="360" class="arrow"/>
  <line x1="1450" y1="470" x2="1235" y2="390" class="arrow"/>
  <line x1="1450" y1="640" x2="1235" y2="420" class="arrow"/>
  <line x1="1450" y1="810" x2="1235" y2="450" class="arrow"/>
  <text x="1330" y="535" text-anchor="middle" class="label">stored data for reporting</text>

  <line x1="1450" y1="980" x2="1235" y2="850" class="arrow"/>
  <text x="1330" y="900" text-anchor="middle" class="label">sync responses / restore data</text>
</svg>
