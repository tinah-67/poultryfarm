<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #111; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #444; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .laneTitle { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
      .step { fill: #ffffff; stroke: #1f2937; stroke-width: 2.4; rx: 14; ry: 14; }
      .decision { fill: #ffffff; stroke: #1f2937; stroke-width: 2.4; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 2.6; fill: none; marker-end: url(#arrowhead); }
      .arrowBack { stroke: #111827; stroke-width: 2.3; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 10 8; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #111827; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
  </defs>

  <text x="900" y="48" text-anchor="middle" class="title">Synchronization Workflow Diagram</text>
  <text x="900" y="80" text-anchor="middle" class="subtitle">BroilerHub offline-first backup, sync, and bootstrap restore flow</text>

  <!-- swimlanes -->
  <rect x="60" y="120" width="380" height="980" class="lane"/>
  <rect x="440" y="120" width="460" height="980" class="lane"/>
  <rect x="900" y="120" width="420" height="980" class="lane"/>
  <rect x="1320" y="120" width="420" height="980" class="lane"/>

  <text x="250" y="155" text-anchor="middle" class="laneTitle">User / App Screen</text>
  <text x="670" y="155" text-anchor="middle" class="laneTitle">Local Device / SQLite</text>
  <text x="1110" y="155" text-anchor="middle" class="laneTitle">Sync Service</text>
  <text x="1530" y="155" text-anchor="middle" class="laneTitle">Backend Server / MySQL</text>

  <!-- main sync flow -->
  <rect x="120" y="210" width="260" height="80" class="step"/>
  <text x="250" y="245" text-anchor="middle" class="text">User records data</text>
  <text x="250" y="270" text-anchor="middle" class="small">farm, batch, feed, mortality,</text>
  <text x="250" y="290" text-anchor="middle" class="small">vaccination, expense, sale</text>

  <rect x="520" y="210" width="300" height="90" class="step"/>
  <text x="670" y="245" text-anchor="middle" class="text">Save locally in SQLite</text>
  <text x="670" y="270" text-anchor="middle" class="small">insert record and set</text>
  <text x="670" y="292" text-anchor="middle" class="small">synced = 0</text>

  <rect x="520" y="360" width="300" height="90" class="step"/>
  <text x="670" y="395" text-anchor="middle" class="text">Keep working offline</text>
  <text x="670" y="420" text-anchor="middle" class="small">all operations continue</text>
  <text x="670" y="442" text-anchor="middle" class="small">against local database</text>

  <rect x="980" y="210" width="260" height="90" class="step"/>
  <text x="1110" y="245" text-anchor="middle" class="text">Sync triggered</text>
  <text x="1110" y="270" text-anchor="middle" class="small">dashboard refresh, focus,</text>
  <text x="1110" y="292" text-anchor="middle" class="small">or explicit sync action</text>

  <rect x="980" y="360" width="260" height="90" class="step"/>
  <text x="1110" y="395" text-anchor="middle" class="text">Query unsynced rows</text>
  <text x="1110" y="420" text-anchor="middle" class="small">select where synced = 0</text>
  <text x="1110" y="442" text-anchor="middle" class="small">and parent records are synced</text>

  <polygon points="1110,520 1220,590 1110,660 1000,590" class="decision"/>
  <text x="1110" y="585" text-anchor="middle" class="text">Unsynced</text>
  <text x="1110" y="608" text-anchor="middle" class="text">records?</text>

  <rect x="980" y="730" width="260" height="90" class="step"/>
  <text x="1110" y="765" text-anchor="middle" class="text">Build payload per table</text>
  <text x="1110" y="790" text-anchor="middle" class="small">users, farms, batches, records,</text>
  <text x="1110" y="812" text-anchor="middle" class="small">expenses, sales</text>

  <rect x="1400" y="730" width="260" height="90" class="step"/>
  <text x="1530" y="765" text-anchor="middle" class="text">POST /backup/&lt;table&gt;</text>
  <text x="1530" y="790" text-anchor="middle" class="small">upsert into MySQL</text>
  <text x="1530" y="812" text-anchor="middle" class="small">return syncedIds / skipped</text>

  <polygon points="1110,900 1220,970 1110,1040 1000,970" class="decision"/>
  <text x="1110" y="965" text-anchor="middle" class="text">Sync</text>
  <text x="1110" y="988" text-anchor="middle" class="text">successful?</text>

  <rect x="520" y="900" width="300" height="90" class="step"/>
  <text x="670" y="935" text-anchor="middle" class="text">Mark records synced</text>
  <text x="670" y="960" text-anchor="middle" class="small">update local rows using</text>
  <text x="670" y="982" text-anchor="middle" class="small">syncedIds from response</text>

  <rect x="980" y="1080" width="260" height="80" class="step"/>
  <text x="1110" y="1115" text-anchor="middle" class="text">Leave rows pending</text>
  <text x="1110" y="1138" text-anchor="middle" class="small">retry on next sync</text>

  <rect x="120" y="900" width="260" height="90" class="step"/>
  <text x="250" y="935" text-anchor="middle" class="text">Updated state visible</text>
  <text x="250" y="960" text-anchor="middle" class="small">reports, counts, and backup</text>
  <text x="250" y="982" text-anchor="middle" class="small">status reflect new sync state</text>

  <rect x="120" y="500" width="260" height="90" class="step"/>
  <text x="250" y="535" text-anchor="middle" class="text">User opens app on</text>
  <text x="250" y="560" text-anchor="middle" class="text">new or reset device</text>

  <rect x="980" y="500" width="260" height="90" class="step"/>
  <text x="1110" y="535" text-anchor="middle" class="text">Bootstrap login request</text>
  <text x="1110" y="560" text-anchor="middle" class="small">send email + password</text>

  <rect x="1400" y="500" width="260" height="90" class="step"/>
  <text x="1530" y="535" text-anchor="middle" class="text">Authenticate user</text>
  <text x="1530" y="560" text-anchor="middle" class="small">assemble bootstrap payload</text>

  <rect x="520" y="520" width="300" height="90" class="step"/>
  <text x="670" y="555" text-anchor="middle" class="text">Import bootstrap data</text>
  <text x="670" y="580" text-anchor="middle" class="small">insert / replace local rows</text>
  <text x="670" y="602" text-anchor="middle" class="small">set synced = 1</text>

  <!-- arrows -->
  <line x1="380" y1="250" x2="520" y2="250" class="arrow"/>
  <line x1="670" y1="300" x2="670" y2="360" class="arrow"/>
  <line x1="820" y1="255" x2="980" y2="255" class="arrow"/>
  <line x1="1110" y1="300" x2="1110" y2="360" class="arrow"/>
  <line x1="1110" y1="450" x2="1110" y2="520" class="arrow"/>
  <line x1="1220" y1="590" x2="1335" y2="590" class="arrow"/>
  <text x="1275" y="575" text-anchor="middle" class="label">Yes</text>
  <path d="M1000 590 L930 590 L930 255 L980 255" class="arrowBack"/>
  <text x="918" y="580" text-anchor="end" class="label">No</text>
  <line x1="1110" y1="660" x2="1110" y2="730" class="arrow"/>
  <line x1="1240" y1="775" x2="1400" y2="775" class="arrow"/>
  <line x1="1530" y1="820" x2="1530" y2="970" class="arrow"/>
  <line x1="1400" y1="970" x2="1220" y2="970" class="arrow"/>
  <line x1="1000" y1="970" x2="820" y2="970" class="arrow"/>
  <text x="915" y="955" text-anchor="middle" class="label">Yes</text>
  <line x1="670" y1="990" x2="380" y2="990" class="arrow"/>
  <path d="M1110 1040 L1110 1080" class="arrow"/>
  <text x="1145" y="1065" class="label">No</text>

  <!-- bootstrap arrows -->
  <line x1="380" y1="545" x2="520" y2="565" class="arrow"/>
  <line x1="820" y1="545" x2="980" y2="545" class="arrow"/>
  <line x1="1240" y1="545" x2="1400" y2="545" class="arrow"/>
  <path d="M1400 575 L1290 575 L1290 645 L820 645" class="arrowBack"/>
  <text x="1140" y="630" text-anchor="middle" class="label">bootstrap data</text>
  <line x1="670" y1="610" x2="670" y2="730" class="arrowBack"/>
  <text x="695" y="680" class="label">local ready state</text>
</svg>
