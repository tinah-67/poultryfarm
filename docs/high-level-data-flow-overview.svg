<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="950" viewBox="0 0 1700 950">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; fill: #111; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #444; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2.8; rx: 14; ry: 14; }
      .db { fill: #ffffff; stroke: #1f2937; stroke-width: 2.8; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #111; }
      .body { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 2.8; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
  </defs>

  <text x="850" y="55" text-anchor="middle" class="title">High-Level Data Flow Overview Diagram</text>
  <text x="850" y="88" text-anchor="middle" class="subtitle">BroilerHub Poultry Farm Management System</text>

  <!-- User -->
  <rect x="80" y="350" width="220" height="110" class="box"/>
  <text x="190" y="405" text-anchor="middle" class="label">User</text>
  <text x="190" y="435" text-anchor="middle" class="small">Owner / Manager / Worker</text>

  <!-- Mobile App -->
  <rect x="430" y="290" width="330" height="220" class="box"/>
  <text x="595" y="345" text-anchor="middle" class="label">Mobile Application</text>
  <text x="595" y="385" text-anchor="middle" class="body">Records farm activities</text>
  <text x="595" y="415" text-anchor="middle" class="body">Processes user input</text>
  <text x="595" y="445" text-anchor="middle" class="body">Manages synchronization</text>

  <!-- Local DB -->
  <ellipse cx="940" cy="315" rx="130" ry="34" class="db"/>
  <rect x="810" y="315" width="260" height="170" class="db"/>
  <ellipse cx="940" cy="485" rx="130" ry="34" class="db"/>
  <text x="940" y="375" text-anchor="middle" class="label">Local Database</text>
  <text x="940" y="410" text-anchor="middle" class="small">stores records offline</text>
  <text x="940" y="438" text-anchor="middle" class="small">pending sync data</text>

  <!-- Backend API -->
  <rect x="1180" y="290" width="280" height="220" class="box"/>
  <text x="1320" y="350" text-anchor="middle" class="label">Backend API</text>
  <text x="1320" y="390" text-anchor="middle" class="body">Receives synced data</text>
  <text x="1320" y="420" text-anchor="middle" class="body">Processes requests</text>
  <text x="1320" y="450" text-anchor="middle" class="body">Returns confirmations</text>

  <!-- Cloud DB -->
  <ellipse cx="940" cy="650" rx="140" ry="36" class="db"/>
  <rect x="800" y="650" width="280" height="170" class="db"/>
  <ellipse cx="940" cy="820" rx="140" ry="36" class="db"/>
  <text x="940" y="715" text-anchor="middle" class="label">Cloud Database</text>
  <text x="940" y="748" text-anchor="middle" class="small">central backup storage</text>
  <text x="940" y="776" text-anchor="middle" class="small">persistent synchronized records</text>

  <!-- Flows -->
  <line x1="300" y1="385" x2="430" y2="385" class="arrow"/>
  <text x="365" y="365" text-anchor="middle" class="body">farm activity input</text>

  <line x1="760" y1="360" x2="810" y2="360" class="arrow"/>
  <text x="785" y="340" text-anchor="middle" class="body">store data</text>

  <line x1="810" y1="445" x2="760" y2="445" class="arrow dashed"/>
  <text x="785" y="470" text-anchor="middle" class="small">retrieve local data</text>

  <line x1="1070" y1="360" x2="1180" y2="360" class="arrow"/>
  <text x="1125" y="340" text-anchor="middle" class="body">sync request</text>

  <line x1="1180" y1="445" x2="1070" y2="445" class="arrow dashed"/>
  <text x="1125" y="470" text-anchor="middle" class="small">confirmation response</text>

  <path d="M1320 510 L1320 650 L1080 650" class="arrow"/>
  <text x="1210" y="630" text-anchor="middle" class="body">store processed data</text>

  <line x1="800" y1="600" x2="595" y2="510" class="arrow dashed"/>
  <text x="680" y="565" text-anchor="middle" class="small">data available for restore / sync</text>

  <!-- workflow note -->
  <rect x="1180" y="640" width="360" height="170" class="box"/>
  <text x="1360" y="690" text-anchor="middle" class="label">Workflow Summary</text>
  <text x="1360" y="725" text-anchor="middle" class="small">1. User records activities in mobile app</text>
  <text x="1360" y="750" text-anchor="middle" class="small">2. App stores them in local database</text>
  <text x="1360" y="775" text-anchor="middle" class="small">3. When online, app syncs data to backend</text>
  <text x="1360" y="800" text-anchor="middle" class="small">4. Backend stores data in cloud database</text>
</svg>
