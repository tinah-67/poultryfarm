<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1100" viewBox="0 0 1700 1100">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #1a1a1a; }
      .entity-name { font-family: Arial, Helvetica, sans-serif; font-size: 21px; font-weight: 700; fill: #1a1a1a; }
      .attr { font-family: Consolas, 'Courier New', monospace; font-size: 17px; fill: #1a1a1a; }
      .card { fill: #ffffff; stroke: #222222; stroke-width: 2.5; rx: 10; ry: 10; }
      .divider { stroke: #222222; stroke-width: 2; }
      .line { stroke: #222222; stroke-width: 2.5; fill: none; }
      .rel { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #1a1a1a; font-weight: 700; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #333333; }
    </style>
  </defs>

  <text x="850" y="55" text-anchor="middle" class="title">Simplified ER Diagram - BroilerHub</text>
  <text x="850" y="88" text-anchor="middle" class="note">Each entity shows PK, FK, and two main attributes</text>

  <!-- USERS -->
  <rect x="80" y="120" width="260" height="150" class="card"/>
  <line x1="80" y1="165" x2="340" y2="165" class="divider"/>
  <text x="210" y="148" text-anchor="middle" class="entity-name">USERS</text>
  <text x="105" y="195" class="attr">PK user_id</text>
  <text x="105" y="223" class="attr">FK owner_user_id</text>
  <text x="105" y="251" class="attr">first_name</text>
  <text x="105" y="279" class="attr">role</text>

  <!-- FARMS -->
  <rect x="470" y="120" width="260" height="150" class="card"/>
  <line x1="470" y1="165" x2="730" y2="165" class="divider"/>
  <text x="600" y="148" text-anchor="middle" class="entity-name">FARMS</text>
  <text x="495" y="195" class="attr">PK farm_id</text>
  <text x="495" y="223" class="attr">FK user_id</text>
  <text x="495" y="251" class="attr">farm_name</text>
  <text x="495" y="279" class="attr">location</text>

  <!-- BATCHES -->
  <rect x="860" y="120" width="260" height="150" class="card"/>
  <line x1="860" y1="165" x2="1120" y2="165" class="divider"/>
  <text x="990" y="148" text-anchor="middle" class="entity-name">BATCHES</text>
  <text x="885" y="195" class="attr">PK batch_id</text>
  <text x="885" y="223" class="attr">FK farm_id</text>
  <text x="885" y="251" class="attr">breed</text>
  <text x="885" y="279" class="attr">start_date</text>

  <!-- SALES -->
  <rect x="1250" y="120" width="300" height="150" class="card"/>
  <line x1="1250" y1="165" x2="1550" y2="165" class="divider"/>
  <text x="1400" y="148" text-anchor="middle" class="entity-name">SALES</text>
  <text x="1275" y="195" class="attr">PK sale_id</text>
  <text x="1275" y="223" class="attr">FK batch_id</text>
  <text x="1275" y="251" class="attr">birds_sold</text>
  <text x="1275" y="279" class="attr">total_revenue</text>

  <!-- FEED_RECORDS -->
  <rect x="180" y="430" width="300" height="150" class="card"/>
  <line x1="180" y1="475" x2="480" y2="475" class="divider"/>
  <text x="330" y="458" text-anchor="middle" class="entity-name">FEED_RECORDS</text>
  <text x="205" y="505" class="attr">PK feed_id</text>
  <text x="205" y="533" class="attr">FK batch_id</text>
  <text x="205" y="561" class="attr">feed_type</text>
  <text x="205" y="589" class="attr">feed_quantity</text>

  <!-- MORTALITY_RECORDS -->
  <rect x="560" y="430" width="330" height="150" class="card"/>
  <line x1="560" y1="475" x2="890" y2="475" class="divider"/>
  <text x="725" y="458" text-anchor="middle" class="entity-name">MORTALITY_RECORDS</text>
  <text x="585" y="505" class="attr">PK mortality_id</text>
  <text x="585" y="533" class="attr">FK batch_id</text>
  <text x="585" y="561" class="attr">number_dead</text>
  <text x="585" y="589" class="attr">date_recorded</text>

  <!-- VACCINATION_RECORDS -->
  <rect x="970" y="430" width="360" height="150" class="card"/>
  <line x1="970" y1="475" x2="1330" y2="475" class="divider"/>
  <text x="1150" y="458" text-anchor="middle" class="entity-name">VACCINATION_RECORDS</text>
  <text x="995" y="505" class="attr">PK vaccination_id</text>
  <text x="995" y="533" class="attr">FK batch_id</text>
  <text x="995" y="561" class="attr">vaccine_name</text>
  <text x="995" y="589" class="attr">vaccination_date</text>

  <!-- EXPENSES -->
  <rect x="640" y="760" width="420" height="170" class="card"/>
  <line x1="640" y1="805" x2="1060" y2="805" class="divider"/>
  <text x="850" y="788" text-anchor="middle" class="entity-name">EXPENSES</text>
  <text x="665" y="835" class="attr">PK expense_id</text>
  <text x="665" y="863" class="attr">FK farm_id / batch_id</text>
  <text x="665" y="891" class="attr">amount</text>
  <text x="665" y="919" class="attr">expense_date</text>

  <!-- relationships -->
  <line x1="340" y1="195" x2="470" y2="195" class="line"/>
  <text x="405" y="183" text-anchor="middle" class="rel">1 : M</text>

  <line x1="730" y1="195" x2="860" y2="195" class="line"/>
  <text x="795" y="183" text-anchor="middle" class="rel">1 : M</text>

  <line x1="1120" y1="195" x2="1250" y2="195" class="line"/>
  <text x="1185" y="183" text-anchor="middle" class="rel">1 : M</text>

  <line x1="990" y1="270" x2="990" y2="430" class="line"/>
  <text x="1010" y="352" class="rel">1 : M</text>

  <line x1="930" y1="270" x2="810" y2="430" class="line"/>
  <text x="882" y="352" class="rel">1 : M</text>

  <line x1="900" y1="270" x2="430" y2="430" class="line"/>
  <text x="640" y="338" class="rel">1 : M</text>

  <line x1="950" y1="270" x2="850" y2="760" class="line"/>
  <text x="920" y="520" class="rel">1 : M</text>

  <line x1="600" y1="270" x2="760" y2="760" class="line"/>
  <text x="650" y="520" class="rel">1 : M</text>
</svg>
