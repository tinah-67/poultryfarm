<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1300" viewBox="0 0 1900 1300">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #111; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #333; }
      .entity { fill: #fff; stroke: #222; stroke-width: 2.5; }
      .diamond { fill: #fff; stroke: #222; stroke-width: 2.5; }
      .oval { fill: #fff; stroke: #222; stroke-width: 2.2; }
      .line { stroke: #222; stroke-width: 2.2; fill: none; }
      .entityText { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #111; }
      .relText { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #111; }
      .attrText { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #111; }
      .pk { text-decoration: underline; font-weight: 700; }
      .tag { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #444; font-weight: 700; }
    </style>
  </defs>

  <text x="950" y="50" text-anchor="middle" class="title">Chen Style ER Diagram - BroilerHub</text>
  <text x="950" y="80" text-anchor="middle" class="subtitle">Each entity shows PK, FK, and two main attributes</text>

  <!-- USERS -->
  <rect x="80" y="110" width="190" height="80" class="entity"/>
  <text x="175" y="158" text-anchor="middle" class="entityText">USERS</text>
  <ellipse cx="60" cy="65" rx="78" ry="28" class="oval"/>
  <text x="60" y="70" text-anchor="middle" class="attrText pk">PK user_id</text>
  <line x1="78" y1="84" x2="128" y2="110" class="line"/>
  <ellipse cx="285" cy="55" rx="105" ry="28" class="oval"/>
  <text x="285" y="60" text-anchor="middle" class="attrText">FK owner_user_id</text>
  <line x1="268" y1="82" x2="232" y2="110" class="line"/>
  <ellipse cx="45" cy="240" rx="92" ry="28" class="oval"/>
  <text x="45" y="245" text-anchor="middle" class="attrText">first_name</text>
  <line x1="90" y1="223" x2="135" y2="190" class="line"/>
  <ellipse cx="305" cy="245" rx="62" ry="28" class="oval"/>
  <text x="305" y="250" text-anchor="middle" class="attrText">role</text>
  <line x1="268" y1="197" x2="250" y2="218" class="line"/>

  <!-- FARMS -->
  <rect x="470" y="110" width="190" height="80" class="entity"/>
  <text x="565" y="158" text-anchor="middle" class="entityText">FARMS</text>
  <ellipse cx="445" cy="60" rx="78" ry="28" class="oval"/>
  <text x="445" y="65" text-anchor="middle" class="attrText pk">PK farm_id</text>
  <line x1="468" y1="84" x2="515" y2="110" class="line"/>
  <ellipse cx="690" cy="60" rx="70" ry="28" class="oval"/>
  <text x="690" y="65" text-anchor="middle" class="attrText">FK user_id</text>
  <line x1="665" y1="84" x2="620" y2="110" class="line"/>
  <ellipse cx="435" cy="245" rx="88" ry="28" class="oval"/>
  <text x="435" y="250" text-anchor="middle" class="attrText">farm_name</text>
  <line x1="492" y1="196" x2="470" y2="220" class="line"/>
  <ellipse cx="690" cy="245" rx="72" ry="28" class="oval"/>
  <text x="690" y="250" text-anchor="middle" class="attrText">location</text>
  <line x1="638" y1="194" x2="660" y2="220" class="line"/>

  <!-- BATCHES -->
  <rect x="870" y="110" width="200" height="80" class="entity"/>
  <text x="970" y="158" text-anchor="middle" class="entityText">BATCHES</text>
  <ellipse cx="840" cy="60" rx="82" ry="28" class="oval"/>
  <text x="840" y="65" text-anchor="middle" class="attrText pk">PK batch_id</text>
  <line x1="872" y1="84" x2="920" y2="110" class="line"/>
  <ellipse cx="1095" cy="60" rx="72" ry="28" class="oval"/>
  <text x="1095" y="65" text-anchor="middle" class="attrText">FK farm_id</text>
  <line x1="1070" y1="84" x2="1025" y2="110" class="line"/>
  <ellipse cx="835" cy="245" rx="58" ry="28" class="oval"/>
  <text x="835" y="250" text-anchor="middle" class="attrText">breed</text>
  <line x1="908" y1="193" x2="872" y2="220" class="line"/>
  <ellipse cx="1105" cy="245" rx="84" ry="28" class="oval"/>
  <text x="1105" y="250" text-anchor="middle" class="attrText">start_date</text>
  <line x1="1035" y1="191" x2="1072" y2="220" class="line"/>

  <!-- SALES -->
  <rect x="1320" y="110" width="180" height="80" class="entity"/>
  <text x="1410" y="158" text-anchor="middle" class="entityText">SALES</text>
  <ellipse cx="1290" cy="60" rx="72" ry="28" class="oval"/>
  <text x="1290" y="65" text-anchor="middle" class="attrText pk">PK sale_id</text>
  <line x1="1328" y1="84" x2="1370" y2="110" class="line"/>
  <ellipse cx="1525" cy="60" rx="74" ry="28" class="oval"/>
  <text x="1525" y="65" text-anchor="middle" class="attrText">FK batch_id</text>
  <line x1="1490" y1="84" x2="1460" y2="110" class="line"/>
  <ellipse cx="1285" cy="245" rx="82" ry="28" class="oval"/>
  <text x="1285" y="250" text-anchor="middle" class="attrText">birds_sold</text>
  <line x1="1360" y1="194" x2="1325" y2="220" class="line"/>
  <ellipse cx="1545" cy="245" rx="98" ry="28" class="oval"/>
  <text x="1545" y="250" text-anchor="middle" class="attrText">total_revenue</text>
  <line x1="1465" y1="193" x2="1500" y2="220" class="line"/>

  <!-- FEED_RECORDS -->
  <rect x="120" y="520" width="250" height="80" class="entity"/>
  <text x="245" y="568" text-anchor="middle" class="entityText">FEED_RECORDS</text>
  <ellipse cx="95" cy="470" rx="72" ry="28" class="oval"/>
  <text x="95" y="475" text-anchor="middle" class="attrText pk">PK feed_id</text>
  <line x1="145" y1="490" x2="180" y2="520" class="line"/>
  <ellipse cx="405" cy="470" rx="74" ry="28" class="oval"/>
  <text x="405" y="475" text-anchor="middle" class="attrText">FK batch_id</text>
  <line x1="355" y1="490" x2="315" y2="520" class="line"/>
  <ellipse cx="85" cy="650" rx="76" ry="28" class="oval"/>
  <text x="85" y="655" text-anchor="middle" class="attrText">feed_type</text>
  <line x1="152" y1="602" x2="130" y2="625" class="line"/>
  <ellipse cx="405" cy="650" rx="92" ry="28" class="oval"/>
  <text x="405" y="655" text-anchor="middle" class="attrText">feed_quantity</text>
  <line x1="332" y1="602" x2="360" y2="625" class="line"/>

  <!-- MORTALITY_RECORDS -->
  <rect x="530" y="520" width="310" height="80" class="entity"/>
  <text x="685" y="568" text-anchor="middle" class="entityText">MORTALITY_RECORDS</text>
  <ellipse cx="505" cy="470" rx="95" ry="28" class="oval"/>
  <text x="505" y="475" text-anchor="middle" class="attrText pk">PK mortality_id</text>
  <line x1="570" y1="490" x2="620" y2="520" class="line"/>
  <ellipse cx="870" cy="470" rx="74" ry="28" class="oval"/>
  <text x="870" y="475" text-anchor="middle" class="attrText">FK batch_id</text>
  <line x1="820" y1="490" x2="760" y2="520" class="line"/>
  <ellipse cx="500" cy="650" rx="92" ry="28" class="oval"/>
  <text x="500" y="655" text-anchor="middle" class="attrText">number_dead</text>
  <line x1="605" y1="602" x2="555" y2="625" class="line"/>
  <ellipse cx="875" cy="650" rx="94" ry="28" class="oval"/>
  <text x="875" y="655" text-anchor="middle" class="attrText">date_recorded</text>
  <line x1="770" y1="602" x2="825" y2="625" class="line"/>

  <!-- VACCINATION_RECORDS -->
  <rect x="1030" y="520" width="350" height="80" class="entity"/>
  <text x="1205" y="568" text-anchor="middle" class="entityText">VACCINATION_RECORDS</text>
  <ellipse cx="1005" cy="470" rx="108" ry="28" class="oval"/>
  <text x="1005" y="475" text-anchor="middle" class="attrText pk">PK vaccination_id</text>
  <line x1="1085" y1="490" x2="1140" y2="520" class="line"/>
  <ellipse cx="1410" cy="470" rx="74" ry="28" class="oval"/>
  <text x="1410" y="475" text-anchor="middle" class="attrText">FK batch_id</text>
  <line x1="1355" y1="490" x2="1295" y2="520" class="line"/>
  <ellipse cx="1000" cy="650" rx="100" ry="28" class="oval"/>
  <text x="1000" y="655" text-anchor="middle" class="attrText">vaccine_name</text>
  <line x1="1115" y1="602" x2="1060" y2="625" class="line"/>
  <ellipse cx="1415" cy="650" rx="104" ry="28" class="oval"/>
  <text x="1415" y="655" text-anchor="middle" class="attrText">vaccination_date</text>
  <line x1="1295" y1="602" x2="1355" y2="625" class="line"/>

  <!-- EXPENSES -->
  <rect x="710" y="980" width="220" height="80" class="entity"/>
  <text x="820" y="1028" text-anchor="middle" class="entityText">EXPENSES</text>
  <ellipse cx="680" cy="930" rx="92" ry="28" class="oval"/>
  <text x="680" y="935" text-anchor="middle" class="attrText pk">PK expense_id</text>
  <line x1="738" y1="950" x2="770" y2="980" class="line"/>
  <ellipse cx="960" cy="930" rx="115" ry="28" class="oval"/>
  <text x="960" y="935" text-anchor="middle" class="attrText">FK farm_id / batch_id</text>
  <line x1="910" y1="950" x2="870" y2="980" class="line"/>
  <ellipse cx="675" cy="1115" rx="62" ry="28" class="oval"/>
  <text x="675" y="1120" text-anchor="middle" class="attrText">amount</text>
  <line x1="762" y1="1054" x2="720" y2="1090" class="line"/>
  <ellipse cx="975" cy="1115" rx="92" ry="28" class="oval"/>
  <text x="975" y="1120" text-anchor="middle" class="attrText">expense_date</text>
  <line x1="880" y1="1054" x2="930" y2="1090" class="line"/>

  <!-- Relationships -->
  <!-- USERS to FARMS -->
  <polygon points="360,135 420,95 480,135 420,175" class="diamond"/>
  <text x="420" y="141" text-anchor="middle" class="relText">OWNS</text>
  <line x1="270" y1="150" x2="360" y2="135" class="line"/>
  <line x1="480" y1="135" x2="470" y2="150" class="line"/>

  <!-- FARMS to BATCHES -->
  <polygon points="760,135 820,95 880,135 820,175" class="diamond"/>
  <text x="820" y="141" text-anchor="middle" class="relText">HAS</text>
  <line x1="660" y1="150" x2="760" y2="135" class="line"/>
  <line x1="880" y1="135" x2="870" y2="150" class="line"/>

  <!-- BATCHES to SALES -->
  <polygon points="1160,135 1220,95 1280,135 1220,175" class="diamond"/>
  <text x="1220" y="141" text-anchor="middle" class="relText">HAS</text>
  <line x1="1070" y1="150" x2="1160" y2="135" class="line"/>
  <line x1="1280" y1="135" x2="1320" y2="150" class="line"/>

  <!-- BATCHES to FEED -->
  <polygon points="420,340 485,300 550,340 485,380" class="diamond"/>
  <text x="485" y="346" text-anchor="middle" class="relText">HAS</text>
  <line x1="930" y1="190" x2="535" y2="312" class="line"/>
  <line x1="450" y1="375" x2="280" y2="520" class="line"/>

  <!-- BATCHES to MORTALITY -->
  <polygon points="760,340 825,300 890,340 825,380" class="diamond"/>
  <text x="825" y="346" text-anchor="middle" class="relText">HAS</text>
  <line x1="970" y1="190" x2="860" y2="300" class="line"/>
  <line x1="800" y1="380" x2="720" y2="520" class="line"/>

  <!-- BATCHES to VACCINATION -->
  <polygon points="1100,340 1170,300 1240,340 1170,380" class="diamond"/>
  <text x="1170" y="346" text-anchor="middle" class="relText">HAS</text>
  <line x1="1000" y1="190" x2="1125" y2="300" class="line"/>
  <line x1="1200" y1="380" x2="1205" y2="520" class="line"/>

  <!-- FARMS to EXPENSES -->
  <polygon points="570,840 640,800 710,840 640,880" class="diamond"/>
  <text x="640" y="846" text-anchor="middle" class="relText">HAS</text>
  <line x1="560" y1="190" x2="610" y2="800" class="line"/>
  <line x1="680" y1="880" x2="760" y2="980" class="line"/>

  <!-- BATCHES to EXPENSES -->
  <polygon points="930,840 1000,800 1070,840 1000,880" class="diamond"/>
  <text x="1000" y="846" text-anchor="middle" class="relText">HAS</text>
  <line x1="980" y1="190" x2="990" y2="800" class="line"/>
  <line x1="960" y1="880" x2="860" y2="980" class="line"/>
</svg>
